# cargo-deny owns resolved supply-chain policy for the workspace.
# Run: `cargo deny check`.
#
# When suunta/shaahid are added as git dependencies (see BACKLOG.md), allow their git
# sources here (or move to crates.io once they release).

[advisories]
version = 2
ignore = []

[licenses]
version = 2
allow = ["MIT", "Apache-2.0", "Unicode-3.0", "BSD-3-Clause"]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
    "https://github.com/tacticaldoll/suunta",
    "https://github.com/tacticaldoll/shaahid",
]
